<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#3d3d3a">Full Attention Residuals — FullAttnResOp</text>
  <text x="340" y="44" text-anchor="middle" font-size="11" fill="#5f5e5a">h_l = Σ α_{i→l} · v_i   where   α = softmax( w_l^T · RMSNorm(v_i) )</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Left column: previous layer outputs v_0…v_{l-1} -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Column header -->
  <text x="130" y="74" text-anchor="middle" font-size="11" font-weight="600" fill="#5f5e5a">Previous outputs (keys / values)</text>

  <!-- v0 = embedding -->
  <rect x="30" y="84" width="200" height="32" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="130" y="104" text-anchor="middle" font-size="11" fill="#3c3489">v₀  =  h₁  (token embedding)</text>

  <!-- v1 -->
  <rect x="30" y="128" width="200" height="32" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="130" y="148" text-anchor="middle" font-size="11" fill="#3c3489">v₁  =  f₁(h₁)  attn output</text>

  <!-- v2 -->
  <rect x="30" y="172" width="200" height="32" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="130" y="192" text-anchor="middle" font-size="11" fill="#3c3489">v₂  =  f₂(h₂)  mlp output</text>

  <!-- ellipsis -->
  <text x="130" y="226" text-anchor="middle" font-size="18" fill="#888780">⋮</text>

  <!-- v_{l-1} -->
  <rect x="30" y="238" width="200" height="32" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="130" y="258" text-anchor="middle" font-size="11" fill="#3c3489">v_{l-1}  (latest sublayer)</text>

  <!-- Stack label -->
  <rect x="30" y="288" width="200" height="28" rx="4" fill="#fff" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="130" y="306" text-anchor="middle" font-size="10" fill="#444441">stack → V  (l, B, T, d)</text>

  <!-- Arrow from stack to RMSNorm -->
  <line x1="230" y1="302" x2="282" y2="302" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Right column: attention computation -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Learned query w_l -->
  <rect x="440" y="84" width="200" height="32" rx="6" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1"/>
  <text x="540" y="104" text-anchor="middle" font-size="11" fill="#854f0b">w_l  ∈ ℝ^d   (learned query)</text>
  <text x="540" y="120" text-anchor="middle" font-size="9" fill="#854f0b">1 vector per layer · init N(0, 0.02)</text>

  <!-- Key RMSNorm -->
  <rect x="290" y="284" width="176" height="36" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="378" y="300" text-anchor="middle" font-size="11" font-weight="600" fill="#0f6e56">RMSNorm(V)</text>
  <text x="378" y="314" text-anchor="middle" font-size="9" fill="#0f6e56">K  (l, B, T, d)</text>

  <!-- Arrow from RMSNorm to einsum -->
  <line x1="378" y1="320" x2="378" y2="355" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Arrow from w_l down to einsum -->
  <line x1="540" y1="116" x2="540" y2="340" stroke="#EF9F27" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="540" y1="340" x2="468" y2="355" stroke="#EF9F27" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Einsum: logits -->
  <rect x="290" y="357" width="260" height="36" rx="6" fill="#fff" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="420" y="373" text-anchor="middle" font-size="10" fill="#444441">einsum("d, nbtd → nbt", w_l, K)</text>
  <text x="420" y="387" text-anchor="middle" font-size="9" fill="#888780">logits  (l, B, T)</text>

  <!-- Arrow to softmax -->
  <line x1="420" y1="393" x2="420" y2="418" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Softmax -->
  <rect x="320" y="420" width="200" height="36" rx="6" fill="#fff" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="420" y="436" text-anchor="middle" font-size="11" font-weight="600" fill="#3c3489">softmax(dim=0)</text>
  <text x="420" y="450" text-anchor="middle" font-size="9" fill="#888780">α_{i→l}  (l, B, T)   sums to 1</text>

  <!-- Arrow to weighted sum -->
  <line x1="420" y1="456" x2="420" y2="481" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Also bring V down from left for the weighted sum -->
  <line x1="130" y1="316" x2="130" y2="490" stroke="#7F77DD" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="130" y1="490" x2="302" y2="490" stroke="#7F77DD" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Weighted sum -->
  <rect x="305" y="483" width="230" height="36" rx="6" fill="#fff" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="420" y="499" text-anchor="middle" font-size="10" fill="#444441">einsum("nbt, nbtd → btd", α, V)</text>
  <text x="420" y="513" text-anchor="middle" font-size="9" fill="#888780">weighted sum over l outputs</text>

  <!-- Arrow to output -->
  <line x1="420" y1="519" x2="420" y2="546" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Output -->
  <rect x="320" y="548" width="200" height="36" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
  <text x="420" y="565" text-anchor="middle" font-size="12" font-weight="600" fill="#3c3489">h_l  (B, T, d)</text>
  <text x="420" y="579" text-anchor="middle" font-size="9" fill="#534AB7">bounded magnitude · selective depth</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Connecting lines from each v_i to the stack box -->
  <line x1="130" y1="116" x2="130" y2="288" stroke="#AFA9EC" stroke-width="0.5" stroke-dasharray="3 2"/>
  <line x1="130" y1="160" x2="130" y2="288" stroke="#AFA9EC" stroke-width="0.5" stroke-dasharray="3 2"/>
  <line x1="130" y1="204" x2="130" y2="288" stroke="#AFA9EC" stroke-width="0.5" stroke-dasharray="3 2"/>
  <line x1="130" y1="270" x2="130" y2="288" stroke="#AFA9EC" stroke-width="0.5" stroke-dasharray="3 2"/>

  <!-- Memory note -->
  <rect x="30" y="540" width="240" height="44" rx="6" fill="#FCEBEB" stroke="#F09595" stroke-width="0.5"/>
  <text x="150" y="558" text-anchor="middle" font-size="10" font-weight="600" fill="#A32D2D">Memory: O(L · d)</text>
  <text x="150" y="572" text-anchor="middle" font-size="9" fill="#A32d2d">Overlaps with backprop activations in</text>
  <text x="150" y="584" text-anchor="middle" font-size="9" fill="#A32d2d">vanilla training → zero extra overhead</text>
</svg>
