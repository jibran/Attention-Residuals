<svg width="100%" viewBox="0 0 680 700" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#3d3d3a">AttnResTransformer — vision classification</text>
  <text x="340" y="44" text-anchor="middle" font-size="11" fill="#5f5e5a">transformer.py · MNIST / CIFAR-10 · patch-based ViT-style encoder</text>

  <!-- ═══ Input image ═══ -->
  <rect x="240" y="58" width="200" height="36" rx="8" fill="#f1efe8" stroke="#b4b2a9" stroke-width="0.5"/>
  <text x="340" y="74" text-anchor="middle" font-size="11" fill="#5f5e5a">Input image</text>
  <text x="340" y="88" text-anchor="middle" font-size="10" fill="#888780">(B, C, H, W)</text>

  <line x1="340" y1="94" x2="340" y2="114" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ═══ PatchEmbedding ═══ -->
  <rect x="190" y="116" width="300" height="52" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1"/>
  <text x="340" y="136" text-anchor="middle" font-size="12" font-weight="600" fill="#854f0b">PatchEmbedding</text>
  <text x="340" y="152" text-anchor="middle" font-size="10" fill="#854f0b">split → (img/patch)² patches · Linear(patch_dim, d)</text>
  <text x="340" y="164" text-anchor="middle" font-size="9" fill="#888780">MNIST 28×28 patch=4 → 49 patches  |  CIFAR 32×32 → 64 patches</text>

  <line x1="340" y1="168" x2="340" y2="188" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- pos embed addition -->
  <rect x="240" y="190" width="200" height="32" rx="6" fill="#fff" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="340" y="204" text-anchor="middle" font-size="10" fill="#444441">+ LearnedPosEmbed  (1, T, d)</text>
  <text x="340" y="218" text-anchor="middle" font-size="9" fill="#888780">init trunc_normal(std=0.02)</text>

  <line x1="340" y1="222" x2="340" y2="245" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Repeated layer block -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="60" y="247" width="560" height="278" rx="10" fill="#f8f7f3" stroke="#AFA9EC" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="340" y="268" text-anchor="middle" font-size="10" fill="#534AB7">× depth  (default 8 layers for vision, 6 for LM)</text>

  <!-- BlockAttnResOp before Attn -->
  <rect x="90" y="278" width="500" height="44" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="340" y="297" text-anchor="middle" font-size="11" font-weight="600" fill="#3c3489">BlockAttnResOp  (or FullAttnResOp)</text>
  <text x="340" y="313" text-anchor="middle" font-size="9" fill="#534AB7">attend over [block_reps, partial]  →  h  (B, T, d)</text>

  <line x1="340" y1="322" x2="340" y2="340" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- RMSNorm + Attn -->
  <rect x="90" y="342" width="500" height="44" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="340" y="361" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">RMSNorm  →  CausalSelfAttention</text>
  <text x="340" y="377" text-anchor="middle" font-size="9" fill="#0f6e56">QKV · RoPE · scaled_dot_product_attention(is_causal=True) · proj</text>

  <line x1="340" y1="386" x2="340" y2="404" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- partial_block += attn_out  + possible boundary -->
  <rect x="90" y="406" width="500" height="32" rx="6" fill="#fff" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="340" y="420" text-anchor="middle" font-size="10" fill="#444441">partial_block  +=  attn_out   [boundary check → maybe start new block]</text>
  <text x="340" y="434" text-anchor="middle" font-size="9" fill="#888780">sublayer_idx = layer_num × 2 ;  if sublayer_idx % block_size == 0: push block</text>

  <line x1="340" y1="438" x2="340" y2="456" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- BlockAttnResOp before MLP -->
  <rect x="90" y="458" width="500" height="32" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="340" y="473" text-anchor="middle" font-size="11" font-weight="600" fill="#3c3489">BlockAttnResOp  →  h  (B, T, d)</text>
  <text x="340" y="485" text-anchor="middle" font-size="9" fill="#534AB7">second op before MLP — own learned w_l</text>

  <line x1="340" y1="490" x2="340" y2="508" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- RMSNorm + MLP -->
  <rect x="90" y="510" width="500" height="32" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="340" y="525" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">RMSNorm  →  SwiGLU MLP</text>
  <text x="340" y="537" text-anchor="middle" font-size="9" fill="#0f6e56">down( silu(gate(x)) ⊙ up(x) )   hidden = dim × mlp_multiplier</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- After loop -->
  <line x1="340" y1="525" x2="620" y2="525" stroke="#AFA9EC" stroke-width="0.5" stroke-dasharray="3 2"/>

  <line x1="340" y1="540" x2="340" y2="558" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Sum block reps + partial -->
  <rect x="160" y="560" width="360" height="32" rx="6" fill="#fff" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="340" y="574" text-anchor="middle" font-size="10" fill="#444441">sum(block_reps[1:], partial_block)</text>
  <text x="340" y="586" text-anchor="middle" font-size="9" fill="#888780">aggregate all block summaries (skip embedding block 0)</text>

  <line x1="340" y1="592" x2="340" y2="612" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Mean pool + RMSNorm -->
  <rect x="180" y="614" width="320" height="32" rx="6" fill="#fff" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="340" y="628" text-anchor="middle" font-size="10" fill="#444441">mean(dim=1)  →  RMSNorm  →  (B, d)</text>
  <text x="340" y="642" text-anchor="middle" font-size="9" fill="#888780">pool over sequence then normalise</text>

  <line x1="340" y1="646" x2="340" y2="666" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Output logits -->
  <rect x="220" y="668" width="240" height="28" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
  <text x="340" y="686" text-anchor="middle" font-size="12" font-weight="600" fill="#3c3489">Linear  →  logits  (B, num_classes)</text>
</svg>
