<svg width="100%" viewBox="0 0 680 660" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#3d3d3a">Block Attention Residuals — BlockAttnResOp</text>
  <text x="340" y="44" text-anchor="middle" font-size="11" fill="#5f5e5a">Layers grouped into N blocks · attend over block summaries only · O(N·d) memory</text>

  <!-- ════════════════════════════════════════════════════ -->
  <!-- Top row: four blocks -->
  <!-- ════════════════════════════════════════════════════ -->

  <!-- Block 0 (embedding) -->
  <rect x="20" y="60" width="140" height="70" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="90" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#3c3489">Block 0</text>
  <text x="90" y="97" text-anchor="middle" font-size="10" fill="#534AB7">Token embedding</text>
  <text x="90" y="112" text-anchor="middle" font-size="9" fill="#888780">(B, T, d)</text>
  <!-- summary badge -->
  <rect x="50" y="118" width="80" height="16" rx="4" fill="#534AB7"/>
  <text x="90" y="130" text-anchor="middle" font-size="9" fill="#fff">block rep b₀</text>

  <!-- Block 1 -->
  <rect x="180" y="60" width="140" height="70" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="250" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">Block 1</text>
  <text x="250" y="97" text-anchor="middle" font-size="10" fill="#0f6e56">Attn + MLP layers</text>
  <text x="250" y="112" text-anchor="middle" font-size="9" fill="#888780">std residuals within</text>
  <rect x="210" y="118" width="80" height="16" rx="4" fill="#1D9E75"/>
  <text x="250" y="130" text-anchor="middle" font-size="9" fill="#fff">block rep b₁</text>

  <!-- Block 2 -->
  <rect x="340" y="60" width="140" height="70" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="410" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">Block 2</text>
  <text x="410" y="97" text-anchor="middle" font-size="10" fill="#0f6e56">Attn + MLP layers</text>
  <text x="410" y="112" text-anchor="middle" font-size="9" fill="#888780">std residuals within</text>
  <rect x="370" y="118" width="80" height="16" rx="4" fill="#1D9E75"/>
  <text x="410" y="130" text-anchor="middle" font-size="9" fill="#fff">block rep b₂</text>

  <!-- Current partial block -->
  <rect x="500" y="60" width="160" height="70" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="580" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#854f0b">Current block</text>
  <text x="580" y="97" text-anchor="middle" font-size="10" fill="#854f0b">partial_block  p</text>
  <text x="580" y="112" text-anchor="middle" font-size="9" fill="#888780">intra-block residual sum</text>
  <text x="580" y="124" text-anchor="middle" font-size="9" fill="#888780">(accumulates each sublayer)</text>

  <!-- arrows from block reps down to attention op -->
  <line x1="90" y1="134" x2="90" y2="186" stroke="#534AB7" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="250" y1="134" x2="250" y2="186" stroke="#1D9E75" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="410" y1="134" x2="410" y2="186" stroke="#1D9E75" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="580" y1="134" x2="580" y2="186" stroke="#EF9F27" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ════════════════════════════════════════════════════ -->
  <!-- Stack all reps = [b0, b1, b2, p] -->
  <!-- ════════════════════════════════════════════════════ -->
  <rect x="20" y="188" width="640" height="36" rx="6" fill="#fff" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="340" y="204" text-anchor="middle" font-size="10" fill="#444441">stack([b₀, b₁, b₂, partial])  →  V  (N+1, B, T, d)</text>
  <text x="340" y="218" text-anchor="middle" font-size="9" fill="#888780">N completed blocks + current partial block</text>

  <line x1="340" y1="224" x2="340" y2="250" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Key RMSNorm -->
  <rect x="200" y="252" width="280" height="32" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="340" y="267" text-anchor="middle" font-size="11" font-weight="600" fill="#0f6e56">RMSNorm(V)  →  K  (N+1, B, T, d)</text>
  <text x="340" y="279" text-anchor="middle" font-size="9" fill="#0f6e56">prevents large-magnitude blocks from dominating</text>

  <!-- w_l arrow in -->
  <rect x="530" y="252" width="130" height="32" rx="6" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1"/>
  <text x="595" y="267" text-anchor="middle" font-size="11" fill="#854f0b">w_l  ∈ ℝ^d</text>
  <text x="595" y="279" text-anchor="middle" font-size="9" fill="#888780">learned per-layer query</text>
  <line x1="530" y1="268" x2="480" y2="268" stroke="#EF9F27" stroke-width="1" marker-end="url(#arr)"/>

  <line x1="340" y1="284" x2="340" y2="310" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Logits einsum -->
  <rect x="160" y="312" width="360" height="32" rx="6" fill="#fff" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="340" y="326" text-anchor="middle" font-size="10" fill="#444441">einsum("d, nbtd → nbt", w_l, K)  →  logits  (N+1, B, T)</text>
  <text x="340" y="340" text-anchor="middle" font-size="9" fill="#888780">scalar score per block per token</text>

  <line x1="340" y1="344" x2="340" y2="370" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- softmax -->
  <rect x="220" y="372" width="240" height="32" rx="6" fill="#fff" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="340" y="386" text-anchor="middle" font-size="11" font-weight="600" fill="#3c3489">softmax(dim=0)</text>
  <text x="340" y="400" text-anchor="middle" font-size="9" fill="#888780">α  (N+1, B, T)  —  sums to 1 over blocks</text>

  <line x1="340" y1="404" x2="340" y2="430" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- weighted sum -->
  <rect x="160" y="432" width="360" height="32" rx="6" fill="#fff" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="340" y="446" text-anchor="middle" font-size="10" fill="#444441">einsum("nbt, nbtd → btd", α, V)  →  h</text>
  <text x="340" y="460" text-anchor="middle" font-size="9" fill="#888780">α-weighted sum of block reps + partial</text>

  <line x1="340" y1="464" x2="340" y2="490" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Output h -->
  <rect x="230" y="492" width="220" height="36" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
  <text x="340" y="509" text-anchor="middle" font-size="12" font-weight="600" fill="#3c3489">h  (B, T, d)</text>
  <text x="340" y="523" text-anchor="middle" font-size="9" fill="#534AB7">input to CausalSelfAttention or SwiGLU</text>

  <!-- ════════════════════════════════════════════════════ -->
  <!-- Block boundary note -->
  <!-- ════════════════════════════════════════════════════ -->
  <rect x="20" y="548" width="305" height="96" rx="8" fill="#f1efe8" stroke="#b4b2a9" stroke-width="0.5"/>
  <text x="30" y="568" font-size="11" font-weight="600" fill="#3d3d3a">Block boundary logic</text>
  <text x="30" y="586" font-size="10" fill="#444441">Each transformer layer = 2 sublayers (Attn + MLP)</text>
  <text x="30" y="600" font-size="10" fill="#444441">Boundary when  (layer_num × 2) % block_size == 0</text>
  <text x="30" y="614" font-size="10" fill="#444441">→  append partial to block_reps</text>
  <text x="30" y="628" font-size="10" fill="#444441">→  reset partial to zeros</text>
  <text x="30" y="642" font-size="9" fill="#888780">With block_size=4 → boundary every 2 layers</text>

  <!-- Memory comparison -->
  <rect x="355" y="548" width="305" height="96" rx="8" fill="#f1efe8" stroke="#b4b2a9" stroke-width="0.5"/>
  <text x="365" y="568" font-size="11" font-weight="600" fill="#3d3d3a">Memory comparison</text>
  <rect x="365" y="578" width="120" height="20" rx="3" fill="#FCEBEB" stroke="#F09595" stroke-width="0.5"/>
  <text x="425" y="592" text-anchor="middle" font-size="10" fill="#A32D2D">Full: O(L · d)</text>
  <rect x="505" y="578" width="140" height="20" rx="3" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="575" y="592" text-anchor="middle" font-size="10" fill="#0f6e56">Block: O(N · d)</text>
  <text x="365" y="616" font-size="10" fill="#444441">N ≈ 8 blocks recovers most of Full AttnRes</text>
  <text x="365" y="630" font-size="10" fill="#444441">gains at a fraction of the memory cost</text>
  <text x="365" y="644" font-size="9" fill="#888780">Inference latency overhead &lt; 2%</text>
</svg>
